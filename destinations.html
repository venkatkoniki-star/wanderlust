<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <section id="destinations">
  <div class="dest-header">
    <h2>Popular <em>Destinations</em></h2>
    <p>Explore our handpicked places around the world</p>
  </div>

  <div id="destinations-menu">

    <div class="destination-card">
      <img src="images/morocco.jpg" alt="Marrakech" class="card-img" />
      <div class="card-overlay">
        <div class="card-tag">Trending</div>
        <div class="card-body">
          <h3 class="card-name">Marrakech</h3>
          <span class="card-country">Morocco · Africa</span>
        </div>
      </div>
    </div>

    <div class="destination-card">
      <img src="images/santorini.webp" alt="Santorini" class="card-img" />
      <div class="card-overlay">
        <div class="card-tag">Top Rated</div>
        <div class="card-body">
          <h3 class="card-name">Santorini</h3>
          <span class="card-country">Greece · Europe</span>
        </div>
      </div>
    </div>

    <div class="destination-card">
      <img src="images/bali.webp" alt="Bali" class="card-img" />
      <div class="card-overlay">
        <div class="card-tag">Popular</div>
        <div class="card-body">
          <h3 class="card-name">Bali</h3>
          <span class="card-country">Indonesia · Asia</span>
        </div>
      </div>
    </div>

    

  </div>
</section>
</body>
</html>
