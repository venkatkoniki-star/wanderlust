<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanderlust</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <nav>
    <div class="logo">Wanderlust</div>
    <ul class="nav-links">
      <li><a href="destinations.html">Destinations</a></li>
      <li><a href="#">Experiences</a></li>
      <li><a href="#">Stories</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="eyebrow">Curated Travel Experiences</div>
    <h1>Discover <em>Places</em><br>Worth Remembering</h1>
    <p class="desc">
      Handpicked destinations for curious travelers. From quiet coastlines to ancient cities — find your next story.
    </p>
    <div class="actions">
      <button class="btn btn-fill">Explore Now</button>
      <button class="btn btn-outline">View Destinations</button>
    </div>
  </section>

  <div class="divider"></div>

  <div class="img-strip">
        <div class="strip-img">
            <img src="images/morocco.jpg" alt="Marrakech" class="strip-bg" />
            <div class="strip-label">Marrakech <span>Morocco</span></div>
        </div>

        <div class="strip-img">
            <img src="images/santorini.webp" alt="Santorini" class="strip-bg" />
            <div class="strip-label">Santorini <span>Greece</span></div>
        </div>

        <div class="strip-img">
            <img src="images/bali.webp" alt="Bali" class="strip-bg" />
            <div class="strip-label">Bali <span>Indonesia</span></div>
        </div>
   </div>

</body>

</html>
